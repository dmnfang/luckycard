<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FEFAF0">
<title>Lucky Card</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --surface-base:   #FEFAF0;
  --surface-panel:  #F0E8D5;
  --surface-card:   #FFFFFF;
  --surface-inset:  #F5EFE3;
  --text-primary:   #2D2A1E;
  --text-secondary: #4A4636;
  --text-muted:     #8C8472;
  --text-disabled:  #CEC0AC;
  --text-inverse:   #FFFFFF;
  --stroke-default: #DDD0BA;
  --stroke-medium:  #C4B49A;
  --stroke-selected:#6DBF93;
  --green:          #4AA875;
  --bubble-a:       #E3F1FC;
  --bubble-a-text:  #1A3A52;
  --bubble-b:       #FDF5D6;
  --bubble-b-text:  #52420A;
  --bubble-swap:    #EDE8F7;
  --bubble-swap-text:#3D2A6B;
  --font-display:   'Fredoka', sans-serif;
  --font-ui:        'Nunito', sans-serif;
  --r-sm:   8px;
  --r-md:   12px;
  --r-lg:   16px;
  --r-xl:   24px;
  --r-pill: 9999px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--surface-base); font-family:var(--font-ui); color:var(--text-primary); -webkit-font-smoothing:antialiased; user-select:none; -webkit-user-select:none; }
button { font-family:var(--font-ui); cursor:pointer; border:none; background:none; color:inherit; padding:0; }
button:active { opacity:0.75; }
button:disabled { cursor:not-allowed; opacity:0.4; }
img { display:block; max-width:100%; max-height:100%; object-fit:contain; }

.screen { position:absolute; inset:0; display:none; flex-direction:column; background:var(--surface-base); overflow:hidden; }
.screen.active { display:flex; }

.nav-btn { width:40px; height:40px; border-radius:var(--r-md); background:var(--surface-panel); color:var(--text-secondary); display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; flex-shrink:0; font-size:18px; }
.nav-btn:active { opacity:0.7; transform:scale(0.94); }

/* ══ HOME ══ */
#screen-home { padding:24px; gap:24px; }
.home-topbar { display:flex; align-items:center; height:40px; flex-shrink:0; }
.home-app-title { font-family:var(--font-display); font-size:28px; font-weight:600; color:var(--text-primary); line-height:1; }
.home-body { flex:1; display:flex; gap:24px; min-height:0; }
.deck-panel { flex:1; min-width:0; background:var(--surface-panel); border-radius:var(--r-lg); border:2px solid var(--stroke-default); display:flex; flex-direction:column; padding:24px; gap:16px; overflow:hidden; }
.panel-title { font-family:var(--font-display); font-size:24px; font-weight:500; color:var(--text-primary); flex-shrink:0; }
.deck-list { display:flex; flex-direction:column; gap:12px; overflow-y:auto; flex:1; }
.deck-card { background:var(--surface-card); border-radius:var(--r-lg); border:2px solid transparent; padding:16px 20px; cursor:pointer; display:flex; align-items:center; gap:16px; transition:border-color 0.15s; }
.deck-card:hover { border-color:var(--stroke-default); }
.deck-card:active { opacity:0.85; }
.deck-card-icon { width:52px; height:52px; border-radius:var(--r-md); background:var(--surface-inset); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }
.deck-card-info { flex:1; min-width:0; }
.deck-card-name { font-family:var(--font-display); font-size:22px; font-weight:500; color:var(--text-primary); line-height:1.2; }
.deck-card-grade { font-size:14px; font-weight:700; color:var(--text-muted); margin-top:2px; }
.deck-card-chip { display:inline-flex; align-items:center; background:var(--surface-inset); border-radius:var(--r-pill); padding:0 12px; height:26px; font-size:13px; font-weight:700; color:var(--text-muted); margin-top:6px; }
.deck-card-arrow { font-size:18px; color:var(--stroke-medium); flex-shrink:0; }

/* ══ LP ══ */
#screen-lp { padding:24px; gap:24px; }
.topbar { display:flex; align-items:center; gap:16px; height:40px; flex-shrink:0; }
.topbar-title { font-family:var(--font-display); font-size:26px; font-weight:500; color:var(--text-primary); line-height:1; }
.topbar-sub { font-size:14px; font-weight:700; color:var(--text-muted); margin-top:2px; }
.lp-body { flex:1; display:flex; gap:24px; min-height:0; }
.lp-card { flex:1; background:var(--surface-card); border-radius:var(--r-lg); border:2px solid var(--stroke-default); padding:28px; cursor:pointer; display:flex; flex-direction:column; gap:16px; transition:border-color 0.15s; }
.lp-card:hover { border-color:var(--stroke-medium); }
.lp-card:active { opacity:0.85; }
.lp-level { font-size:13px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); }
.lp-preview { font-family:var(--font-display); font-size:32px; font-weight:500; color:var(--text-primary); line-height:1.45; flex:1; }
.lp-tag { display:inline-flex; align-items:center; background:var(--surface-inset); border-radius:var(--r-pill); padding:0 14px; height:32px; font-size:13px; font-weight:700; color:var(--text-secondary); width:fit-content; }

/* ══ SLIDES ══ */
#screen-slides { padding:24px; gap:16px; }
.slides-topbar { display:flex; align-items:center; gap:12px; height:40px; flex-shrink:0; }
.slides-counter { flex:1; text-align:center; font-size:14px; font-weight:700; color:var(--text-muted); }
.slide-nav-btn { height:40px; padding:0 20px; border-radius:var(--r-md); background:var(--surface-panel); color:var(--text-primary); font-family:var(--font-ui); font-size:15px; font-weight:800; border:none; cursor:pointer; flex-shrink:0; }
.slide-nav-btn:disabled { opacity:0.3; cursor:default; }
.slide-nav-btn:not(:disabled):active { opacity:0.7; transform:scale(0.96); }
.slide-stage { flex:1; min-height:0; position:relative; }
.slide { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; }
.slide.active { display:flex; }

/* Vocab */
.vocab-card { background:var(--surface-card); border-radius:var(--r-lg); border:2px solid var(--stroke-default); width:100%; height:100%; display:flex; flex-direction:column; align-items:center; padding:24px; gap:16px; overflow:hidden; }
.vocab-img-wrap { flex:4; display:flex; align-items:center; justify-content:center; width:100%; min-height:0; overflow:hidden; }
.vocab-img-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
.vocab-word { flex:1; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:clamp(52px,10vw,88px); font-weight:600; color:var(--text-primary); text-align:center; line-height:1.1; }

/* ══ CONVERSATION MODEL ══ */
.convo-card {
  background:var(--surface-card);
  border-radius:var(--r-lg);
  border:2px solid var(--stroke-default);
  width:100%; height:100%;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.convo-header {
  display:flex; flex-shrink:0;
  border-bottom:2px solid var(--stroke-default);
  background:var(--surface-card);
}
.convo-header-side { flex:1; padding:10px 16px; display:flex; align-items:center; gap:8px; }
.convo-header-side.side-b { justify-content:flex-end; border-left:2px solid var(--stroke-default); }
.convo-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; font-family:var(--font-ui); flex-shrink:0; }
.avatar-a { background:var(--bubble-a); color:var(--bubble-a-text); }
.avatar-b { background:var(--bubble-b); color:var(--bubble-b-text); }
.convo-header-name { font-size:14px; font-weight:800; color:var(--text-muted); }

.convo-body {
  flex:1; overflow-y:auto;
  padding:28px 32px;
  display:flex; flex-direction:column; gap:20px;
}
.convo-body::-webkit-scrollbar { width:4px; }
.convo-body::-webkit-scrollbar-thumb { background:var(--stroke-default); border-radius:2px; }

/* Speech bubbles */
.msg-row { display:flex; align-items:flex-end; gap:16px; }
.msg-row.from-a { justify-content:flex-start; }
.msg-row.from-b { justify-content:flex-end; }
.msg-row.from-swap { justify-content:center; }

.msg-avatar {
  width:80px; height:80px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:32px; font-weight:800; font-family:var(--font-ui);
  flex-shrink:0;
}

.bubble {
  padding:24px 36px;
  font-family:var(--font-display);
  font-size:clamp(40px,6vw,72px);
  font-weight:500;
  line-height:1.25;
}

/* A — left, cut bottom-left corner */
.bubble-a {
  background:var(--bubble-a); color:var(--bubble-a-text);
  border-radius:20px 20px 20px 6px;
  max-width:65%;
}

/* B — right, cut bottom-right corner */
.bubble-b {
  background:var(--bubble-b); color:var(--bubble-b-text);
  border-radius:20px 20px 6px 20px;
  max-width:65%;
}

/* Swap — centred, fully round, third color */
.bubble-swap {
  background:var(--bubble-swap); color:var(--bubble-swap-text);
  border-radius:20px;
  padding:24px 48px;
  text-align:center;
  max-width:80%;
}

.bubble .blank {
  display:inline-block; min-width:100px;
  border-bottom:4px solid currentColor;
  opacity:0.4; margin:0 6px; vertical-align:bottom;
}
.bubble .alt {
  display:block;
  font-size:clamp(28px,4vw,52px);
  opacity:0.55;
  margin-top:6px;
}

/* Reference slide */
.ref-card { background:var(--surface-panel); border-radius:var(--r-lg); border:2px solid var(--stroke-default); width:100%; height:100%; display:flex; flex-direction:column; padding:16px; gap:12px; overflow:hidden; }
.ref-model-bar { background:var(--surface-card); border:2px solid var(--stroke-default); border-radius:var(--r-md); padding:14px 20px; flex-shrink:0; display:flex; flex-direction:column; gap:4px; }
.ref-model-line { font-family:var(--font-display); font-size:clamp(18px,3vw,26px); font-weight:500; color:var(--text-primary); line-height:1.4; }
.ref-blank { display:inline-block; min-width:56px; border-bottom:3px solid var(--stroke-medium); opacity:0.45; margin:0 4px; vertical-align:bottom; }
.ref-alt { font-size:clamp(13px,2vw,18px); color:var(--text-muted); }
.vocab-grid { flex:1; display:grid; grid-template-columns:repeat(4, 1fr); grid-template-rows:repeat(2, 1fr); gap:10px; overflow:hidden; }
.vocab-grid.cols-3 { grid-template-columns:repeat(3, 1fr); }
.vocab-mini { background:var(--surface-card); border:2px solid var(--stroke-default); border-radius:var(--r-md); padding:8px; display:flex; flex-direction:column; align-items:center; gap:6px; min-height:0; overflow:hidden; }
.vocab-mini.ghost { background:transparent; }
.vocab-mini-img { flex:4; display:flex; align-items:center; justify-content:center; width:100%; min-height:0; font-size:clamp(32px,6vh,64px); line-height:1; }
.vocab-mini-img img { max-width:100%; max-height:100%; object-fit:contain; }
.vocab-mini-word { flex:1; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:clamp(16px,2.8vh,26px); font-weight:600; text-align:center; color:var(--text-primary); }
.lucky-controls-row { display:flex; align-items:center; gap:12px; flex-shrink:0; background:var(--surface-card); border:2px solid var(--stroke-default); border-radius:var(--r-md); padding:12px 16px; }
.lucky-label { font-size:14px; font-weight:700; color:var(--text-muted); flex-shrink:0; }
.toggle-group { display:flex; gap:6px; }
.toggle-pill { height:40px; padding:0 18px; border-radius:var(--r-pill); border:none; background:var(--surface-inset); color:var(--text-muted); font-family:var(--font-ui); font-size:16px; font-weight:800; cursor:pointer; transition:background 0.15s, color 0.15s; }
.toggle-pill.active { background:var(--green); color:#fff; }
.lucky-btn { height:40px; padding:0 24px; border-radius:var(--r-lg); background:var(--green); color:var(--text-inverse); font-family:var(--font-ui); font-size:15px; font-weight:800; border:none; cursor:pointer; margin-left:auto; }
.lucky-btn:active { transform:scale(0.97); opacity:0.85; }

/* Lucky screen */
#screen-lucky { padding:40px; gap:24px; align-items:center; justify-content:center; }
.lucky-screen-title { font-family:var(--font-display); font-size:clamp(36px,6vw,56px); font-weight:600; color:var(--text-primary); flex-shrink:0; }
.lucky-cards-row { display:flex; gap:20px; align-items:stretch; flex:1; width:100%; }
.lucky-big-card { background:var(--surface-card); border:3px solid var(--stroke-selected); border-radius:var(--r-lg); padding:24px 20px; display:flex; flex-direction:column; align-items:center; gap:12px; flex:1; min-width:0; animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both; }
.lucky-big-card:nth-child(2) { animation-delay:0.08s; }
.lucky-big-card:nth-child(3) { animation-delay:0.16s; }
.lucky-big-card:nth-child(4) { animation-delay:0.24s; }
@keyframes popIn { from { transform:scale(0.75); opacity:0; } to { transform:scale(1); opacity:1; } }
.lucky-big-img { flex:1; display:flex; align-items:center; justify-content:center; font-size:clamp(48px,10vw,80px); line-height:1; width:100%; min-height:0; overflow:hidden; }
.lucky-big-img img { max-width:100%; max-height:100%; object-fit:contain; }
.lucky-big-word { font-family:var(--font-display); font-size:clamp(32px,5vw,52px); font-weight:600; color:var(--text-primary); text-align:center; }
.lucky-actions { display:flex; gap:12px; flex-shrink:0; }
.lucky-back-btn { height:48px; padding:0 28px; border-radius:var(--r-md); background:var(--surface-inset); color:var(--text-secondary); font-family:var(--font-ui); font-size:15px; font-weight:800; border:none; cursor:pointer; }
.lucky-back-btn:active { opacity:0.75; }
.lucky-redraw-btn { height:48px; padding:0 28px; border-radius:var(--r-md); background:var(--green); color:var(--text-inverse); font-family:var(--font-ui); font-size:15px; font-weight:800; border:none; cursor:pointer; }
.lucky-redraw-btn:active { opacity:0.75; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--stroke-default); border-radius:2px; }
</style>
</head>
<body>

<div class="screen active" id="screen-home">
  <div class="home-topbar"><div class="home-app-title">🃏 Lucky Card</div></div>
  <div class="home-body">
    <div class="deck-panel">
      <div class="panel-title">Choose a deck</div>
      <div class="deck-list" id="deck-list"></div>
    </div>
  </div>
</div>

<div class="screen" id="screen-lp">
  <div class="topbar">
    <button class="nav-btn" onclick="goTo('home')">←</button>
    <div>
      <div class="topbar-title" id="lp-title"></div>
      <div class="topbar-sub">Choose a language point</div>
    </div>
  </div>
  <div class="lp-body" id="lp-body"></div>
</div>

<div class="screen" id="screen-slides">
  <div class="slides-topbar">
    <button class="nav-btn" onclick="goTo('lp')">←</button>
    <button class="slide-nav-btn" id="btn-prev" onclick="changeSlide(-1)">← Back</button>
    <div class="slides-counter" id="slides-counter"></div>
    <button class="slide-nav-btn" id="btn-next" onclick="changeSlide(1)">Next →</button>
  </div>
  <div class="slide-stage" id="slide-stage"></div>
</div>

<div class="screen" id="screen-lucky">
  <div class="lucky-screen-title">🌟 Lucky Cards!</div>
  <div class="lucky-cards-row" id="lucky-cards-row"></div>
  <div class="lucky-actions">
    <button class="lucky-back-btn" onclick="goTo('slides-ref')">← Back</button>
    <button class="lucky-redraw-btn" onclick="drawLucky()">Draw Again 🎲</button>
  </div>
</div>

<script>
const DECKS = [
  {
    id:'colors', name:'Colors', grade:'Grade 3', emoji:'🎨',
    vocab:[
      { word:'red',    img:{ type:'img', src:'images/colors/red.png' } },
      { word:'yellow', img:{ type:'img', src:'images/colors/yellow.png' } },
      { word:'pink',   img:{ type:'img', src:'images/colors/pink.png' } },
      { word:'green',  img:{ type:'img', src:'images/colors/green.png' } },
      { word:'purple', img:{ type:'img', src:'images/colors/purple.png' } },
      { word:'orange', img:{ type:'img', src:'images/colors/orange.png' } },
      { word:'blue',   img:{ type:'img', src:'images/colors/blue.png' } },
      { word:'black',  img:{ type:'img', src:'images/colors/black.png' } },
    ],
    languagePoints:[
      {
        id:'lp1', label:'Level 1', tag:'Statement',
        preview:'I like (color).',
        messages:[
          { side:'a', text:'Hello!' },
          { side:'b', text:'Hello!' },
          { side:'a', text:'I like ', blank:true, suffix:'.' },
          { side:'b', text:'I like ', blank:true, suffix:'.' },
          { side:'swap', text:'🔄 Swap cards!' },
          { side:'a', text:'See you!' },
          { side:'b', text:'See you!' },
        ]
      },
      {
        id:'lp2', label:'Level 2', tag:'Q & A',
        preview:'I like (color).\nDo you like (color)?\nYes, I do. / No, I don\'t.',
        messages:[
          { side:'a', text:'Hello!' },
          { side:'b', text:'Hello!' },
          { side:'a', text:'I like ', blank:true, suffix:'.' },
          { side:'b', text:'Do you like ', blank:true, suffix:'?' },
          { side:'a', text:'Yes, I do.', alt:'/ No, I don\'t.' },
          { side:'swap', text:'🔄 Swap cards!' },
          { side:'a', text:'See you!' },
          { side:'b', text:'See you!' },
        ]
      }
    ]
  },
  {
    id:'days', name:'Days of the Week', grade:'Grade 4', emoji:'📅',
    vocab:[
      { word:'Monday',    img:{ type:'img', src:'images/days/Monday.png' } },
      { word:'Tuesday',   img:{ type:'img', src:'images/days/Tuesday.png' } },
      { word:'Wednesday', img:{ type:'img', src:'images/days/Wednesday.png' } },
      { word:'Thursday',  img:{ type:'img', src:'images/days/Thursday.png' } },
      { word:'Friday',    img:{ type:'img', src:'images/days/Friday.png' } },
      { word:'Saturday',  img:{ type:'img', src:'images/days/Saturday.png' } },
      { word:'Sunday',    img:{ type:'img', src:'images/days/Sunday.png' } },
    ],
    languagePoints:[
      {
        id:'lp1', label:'Level 1', tag:'Q & A',
        preview:'What day is it?\nIt\'s (day).',
        messages:[
          { side:'a', text:'Hello!' },
          { side:'b', text:'Hello!' },
          { side:'a', text:'What day is it?' },
          { side:'b', text:'It\'s ', blank:true, suffix:'.' },
          { side:'swap', text:'🔄 Swap cards!' },
          { side:'a', text:'See you!' },
          { side:'b', text:'See you!' },
        ]
      },
      {
        id:'lp2', label:'Level 2', tag:'Q & A',
        preview:'Do you like (Mondays)?\nYes, I do. / No, I don\'t.',
        messages:[
          { side:'a', text:'Hello!' },
          { side:'b', text:'Hello!' },
          { side:'a', text:'Do you like ', blank:true, suffix:'s?' },
          { side:'b', text:'Yes, I do.', alt:'/ No, I don\'t.' },
          { side:'swap', text:'🔄 Swap cards!' },
          { side:'a', text:'See you!' },
          { side:'b', text:'See you!' },
        ]
      }
    ]
  }
];

let state = { deck:null, lp:null, slides:[], slideIndex:0, luckyCount:3 };

function imgHTML(img, size) {
  if (img.type === 'img') return `<img src="${img.src}" alt="">`;
  const fs = size === 'big' ? 'font-size:clamp(80px,18vh,140px)' : 'font-size:36px';
  return `<span style="${fs};line-height:1">${img.val}</span>`;
}

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if (id === 'home') document.getElementById('screen-home').classList.add('active');
  else if (id === 'lp') { renderLP(); document.getElementById('screen-lp').classList.add('active'); }
  else if (id === 'slides') { state.slideIndex = 0; renderSlides(); document.getElementById('screen-slides').classList.add('active'); }
  else if (id === 'slides-ref') { state.slideIndex = state.slides.length - 1; renderSlides(); document.getElementById('screen-slides').classList.add('active'); }
  else if (id === 'lucky') { drawLucky(); document.getElementById('screen-lucky').classList.add('active'); }
}

function renderHome() {
  document.getElementById('deck-list').innerHTML = DECKS.map(d => `
    <div class="deck-card" onclick="selectDeck('${d.id}')">
      <div class="deck-card-icon">${d.emoji}</div>
      <div class="deck-card-info">
        <div class="deck-card-name">${d.name}</div>
        <div class="deck-card-grade">${d.grade}</div>
        <div class="deck-card-chip">🃏 ${d.vocab.length} cards</div>
      </div>
      <div class="deck-card-arrow">→</div>
    </div>`).join('');
}

function selectDeck(id) { state.deck = DECKS.find(d => d.id === id); goTo('lp'); }

function renderLP() {
  document.getElementById('lp-title').textContent = state.deck.name;
  document.getElementById('lp-body').innerHTML = state.deck.languagePoints.map(lp => `
    <div class="lp-card" onclick="selectLP('${lp.id}')">
      <div class="lp-level">${lp.label}</div>
      <div class="lp-preview">${lp.preview.replace(/\n/g, '<br>')}</div>
      <div class="lp-tag">${lp.tag}</div>
    </div>`).join('');
}

function selectLP(id) { state.lp = state.deck.languagePoints.find(l => l.id === id); goTo('slides'); }

function buildConvoHTML() {
  return state.lp.messages.map(msg => {
    if (msg.side === 'swap') {
      return `<div class="msg-row from-swap">
        <div class="bubble bubble-swap">${msg.text}</div>
      </div>`;
    }
    const isA = msg.side === 'a';
    let text = msg.text;
    if (msg.blank) text += `<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>${msg.suffix || ''}`;
    else text += msg.suffix || '';
    if (msg.alt) text += `<span class="alt">${msg.alt}</span>`;
    const avatar = `<div class="msg-avatar ${isA ? 'avatar-a' : 'avatar-b'}">${isA ? 'A' : 'B'}</div>`;
    const bubble = `<div class="bubble ${isA ? 'bubble-a' : 'bubble-b'}">${text}</div>`;
    return `<div class="msg-row ${isA ? 'from-a' : 'from-b'}">${isA ? avatar + bubble : bubble + avatar}</div>`;
  }).join('');
}

function buildSlides() {
  const s = [];
  state.deck.vocab.forEach(v => s.push({ type:'vocab', vocab:v }));
  s.push({ type:'model' });
  s.push({ type:'ref' });
  return s;
}

function renderSlides() {
  state.slides = buildSlides();
  const stage = document.getElementById('slide-stage');

  const vocabHTML = state.deck.vocab.map((v, i) => `
    <div class="slide" data-index="${i}">
      <div class="vocab-card">
        <div class="vocab-img-wrap">${imgHTML(v.img, 'big')}</div>
        <div class="vocab-word">${v.word}</div>
      </div>
    </div>`).join('');

  const exchangeMessages = state.lp.messages.filter(m => m.side !== 'swap');
  const refLinesHTML = exchangeMessages.map(m => {
    const label = m.side === 'a' ? 'A: ' : 'B: ';
    let txt = label + m.text;
    if (m.blank) txt += `<span class="ref-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>${m.suffix || ''}`;
    else txt += m.suffix || '';
    const alt = m.alt ? ` <span class="ref-alt">${m.alt}</span>` : '';
    return `<div class="ref-model-line">${txt}${alt}</div>`;
  }).join('');

  const count = state.deck.vocab.length;
  const cols = count <= 6 ? 3 : 4;
  const total = cols * 2;
  const vocabCards = state.deck.vocab.map(v => `
    <div class="vocab-mini">
      <div class="vocab-mini-img">${imgHTML(v.img, 'mini')}</div>
      <div class="vocab-mini-word">${v.word}</div>
    </div>`).join('');
  const ghosts = Array(Math.max(0, total - count)).fill('<div class="vocab-mini ghost"></div>').join('');
  const minis = vocabCards + ghosts;
  const gridClass = cols === 3 ? 'vocab-grid cols-3' : 'vocab-grid';

  stage.innerHTML = vocabHTML + `
    <div class="slide" data-index="${state.deck.vocab.length}">
      <div class="convo-card">
        <div class="convo-header">
          <div class="convo-header-side side-a">
            <div class="convo-avatar avatar-a">A</div>
            <div class="convo-header-name">Student A</div>
          </div>
          <div class="convo-header-side side-b">
            <div class="convo-header-name">Student B</div>
            <div class="convo-avatar avatar-b">B</div>
          </div>
        </div>
        <div class="convo-body">${buildConvoHTML()}</div>
      </div>
    </div>
    <div class="slide" data-index="${state.deck.vocab.length + 1}">
      <div class="ref-card">
        <div class="ref-model-bar">${refLinesHTML}</div>
        <div class="${gridClass}">${minis}</div>
        <div class="lucky-controls-row">
          <span class="lucky-label">Lucky cards:</span>
          <div class="toggle-group">
            <button class="toggle-pill${state.luckyCount===2?' active':''}" onclick="setLucky(2)">2</button>
            <button class="toggle-pill${state.luckyCount===3?' active':''}" onclick="setLucky(3)">3</button>
            <button class="toggle-pill${state.luckyCount===4?' active':''}" onclick="setLucky(4)">4</button>
          </div>
          <button class="lucky-btn" onclick="goTo('lucky')">🌟 Lucky Card!</button>
        </div>
      </div>
    </div>`;

  updateSlideNav();
}

function setLucky(n) {
  state.luckyCount = n;
  document.querySelectorAll('.toggle-pill').forEach(b => b.classList.toggle('active', parseInt(b.textContent) === n));
}

function changeSlide(dir) {
  state.slideIndex = Math.max(0, Math.min(state.slides.length - 1, state.slideIndex + dir));
  updateSlideNav();
}

function updateSlideNav() {
  const i = state.slideIndex, total = state.slides.length, vc = state.deck.vocab.length;
  document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', idx === i));
  document.getElementById('btn-prev').disabled = i === 0;
  document.getElementById('btn-next').disabled = i === total - 1;
  document.getElementById('slides-counter').textContent =
    i < vc ? `Word ${i+1} of ${vc}` : i === vc ? 'Language Model' : 'Reference';
}

function drawLucky() {
  const picked = [...state.deck.vocab].sort(() => Math.random() - 0.5).slice(0, state.luckyCount);
  document.getElementById('lucky-cards-row').innerHTML = picked.map(v => `
    <div class="lucky-big-card">
      <div class="lucky-big-img">${imgHTML(v.img, 'big')}</div>
      <div class="lucky-big-word">${v.word}</div>
    </div>`).join('');
  document.getElementById('screen-lucky').classList.add('active');
}

renderHome();
</script>
</body>
</html>
